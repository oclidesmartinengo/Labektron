<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELEKTRON | Grupo Labektron</title>
<meta name="description" content="ELEKTRON — Ingeniería e instalaciones electromecánicas. Parte de Grupo Labektron.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="empresa.css">
</head>
<body data-empresa="elektron">

<!-- HEADER -->
<header id="header">
  <div class="contenedor nav">
    <a href="index.html" class="nav__logo">
      <img id="nav-logo" src="" alt="Grupo Labektron">
    </a>
    <nav class="nav__links">
      <a href="index.html">Inicio</a>
      <a href="index.html#empresas">Las empresas</a>
      <a href="#servicios">Servicios</a>
      <a href="index.html#contacto">Contacto</a>
    </nav>
    <a href="index.html#contacto" class="btn" id="nav-boton">Contactanos</a>
  </div>
</header>

<!-- HERO -->
<section class="empresa-hero" id="hero">
  <div class="empresa-hero__glow"></div>
  <div class="contenedor empresa-hero__contenido">
    <a href="index.html" class="volver">← Volver al grupo</a>
    <img class="empresa-hero__logo" id="emp-logo" src="" alt="">
    <span class="empresa-hero__lema" id="emp-lema"></span>
    <p class="empresa-hero__intro" id="emp-intro"></p>
    <div class="empresa-hero__acciones">
      <a href="#servicios" class="btn" id="btn-servicios">Ver servicios</a>
      <a href="index.html#contacto" class="btn btn--ghost">Contacto</a>
    </div>
  </div>
</section>

<!-- SERVICIOS -->
<section class="seccion" id="servicios">
  <div class="contenedor">
    <span class="eyebrow">Qué hacemos</span>
    <h2 class="titulo-seccion">Nuestros servicios</h2>
    <p class="subtitulo-seccion" id="serv-sub"></p>
    <div class="servicios-grid" id="servicios-grid"></div>
  </div>
</section>

<!-- CTA -->
<section class="cta" id="contacto">
  <div class="contenedor">
    <h2 id="cta-titulo"></h2>
    <p id="cta-sub"></p>
    <a id="cta-wa" class="btn" href="#" target="_blank" rel="noopener"></a>
  </div>
</section>

<!-- FOOTER simple -->
<footer class="empresa-footer">
  <div class="contenedor">
    <img id="footer-logo" src="" alt="Grupo Labektron">
    <p>© <span id="anio"></span> <span id="footer-nombre"></span> — <span id="footer-copy"></span></p>
    <a href="index.html">Volver al inicio</a>
  </div>
</footer>

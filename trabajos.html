<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestros proyectos | Grupo Labektron</title>
<meta name="description" content="Todos los proyectos ejecutados por Grupo Labektron.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="trabajos.css">
<style>
  /* Ajustes propios de esta página */
  .pagina-hero { padding: 150px 0 60px; border-bottom: 1px solid var(--borde); position: relative; overflow: hidden; }
  .pagina-hero__glow { position: absolute; inset: 0; z-index: 0; background: radial-gradient(circle at 70% 20%, rgba(0,194,255,0.14), transparent 45%); }
  .pagina-hero > .contenedor { position: relative; z-index: 1; }
  .volver { display: inline-block; color: var(--texto-suave); font-size: 0.9rem; margin-bottom: 26px; transition: color .2s; }
  .volver:hover { color: var(--acento); }
  .pagina-hero .subtitulo-seccion { margin-bottom: 0; }
  /* ===================== LÍNEA DE TIEMPO ===================== */
  .timeline { position: relative; padding: 20px 0 40px; }
  /* Riel vertical central */
  .timeline::before {
    content: ''; position: absolute; left: 50%; top: 0; bottom: 0;
    width: 2px; transform: translateX(-50%);
    background: linear-gradient(180deg, transparent, var(--borde) 6%, var(--borde) 94%, transparent);
  }
  /* Progreso que se pinta al hacer scroll */
  .timeline__progreso {
    position: absolute; left: 50%; top: 0; width: 2px; height: 0;
    transform: translateX(-50%); z-index: 1;
    background: linear-gradient(180deg, var(--acento), var(--acento-2));
    box-shadow: 0 0 14px var(--acento);
    transition: height .15s linear;
  }

  /* Marcador de año */
  .tl-anio { position: relative; z-index: 2; display: flex; justify-content: center; margin: 46px 0 34px; }
  .tl-anio:first-child { margin-top: 0; }
  .tl-anio span {
    font-family: var(--display); font-weight: 800; font-size: 1.05rem; letter-spacing: .1em;
    color: var(--texto); background: var(--fondo-alt);
    border: 1px solid var(--borde); border-radius: 999px; padding: 9px 26px;
    transition: border-color .4s, color .4s, box-shadow .4s, transform .4s;
  }
  .tl-anio.visible span {
    border-color: var(--acento); color: var(--acento);
    box-shadow: 0 0 24px -6px var(--acento); transform: scale(1.05);
  }

  /* Fila de la línea de tiempo (una por proyecto) */
  .tl-item { position: relative; z-index: 2; display: flex; margin-bottom: 40px; }
  .tl-item--izq { justify-content: flex-start; }
  .tl-item--der { justify-content: flex-end; }
  /* Punto sobre el riel */
  .tl-item::before {
    content: ''; position: absolute; left: 50%; top: 40px;
    width: 15px; height: 15px; border-radius: 50%;
    transform: translateX(-50%) scale(.6);
    background: var(--fondo); border: 2px solid var(--borde);
    transition: background .4s, border-color .4s, box-shadow .4s, transform .4s;
    z-index: 3;
  }
  .tl-item.visible::before {
    background: var(--acento); border-color: var(--acento);
    box-shadow: 0 0 0 5px rgba(0,194,255,0.16), 0 0 20px var(--acento);
    transform: translateX(-50%) scale(1);
  }
  /* Conector del riel a la tarjeta */
  .tl-item::after {
    content: ''; position: absolute; top: 47px; width: 0; height: 2px;
    background: var(--borde); transition: width .5s ease .1s;
  }
  .tl-item--izq::after { right: 50%; }
  .tl-item--der::after { left: 50%; }
  .tl-item.visible::after { width: 42px; }

  .tl-caja { width: calc(50% - 58px); }
  /* Entrada animada desde cada lado */
  .tl-item--izq .tl-caja { opacity: 0; transform: translateX(-40px); transition: opacity .6s ease, transform .6s ease; }
  .tl-item--der .tl-caja { opacity: 0; transform: translateX(40px); transition: opacity .6s ease, transform .6s ease; }
  .tl-item.visible .tl-caja { opacity: 1; transform: none; }

  /* Fecha sobre la tarjeta */
  .tl-fecha {
    font-family: var(--display); font-weight: 600; font-size: .8rem;
    letter-spacing: .14em; text-transform: uppercase; color: var(--acento); margin-bottom: 10px;
  }
  .tl-item--der .tl-fecha { text-align: left; }
  .tl-item--izq .tl-fecha { text-align: right; }

  @media (max-width: 820px) {
    /* En celular: riel a la izquierda y todo de un solo lado */
    .timeline::before, .timeline__progreso { left: 18px; transform: none; }
    .tl-anio { justify-content: flex-start; padding-left: 4px; }
    .tl-item, .tl-item--izq, .tl-item--der { justify-content: flex-end; }
    .tl-item::before { left: 18px; }
    .tl-item::after { left: 18px; right: auto; }
    .tl-item.visible::after { width: 26px; }
    .tl-caja { width: calc(100% - 56px); }
    .tl-item--izq .tl-fecha { text-align: left; }
    .tl-item--izq .tl-caja, .tl-item--der .tl-caja { transform: translateX(30px); }
    .tl-item.visible .tl-caja { transform: none; }
  }
</style>
</head>
<body>

<header id="header">
  <div class="contenedor nav">
    <a href="index.html" class="nav__logo"><img id="nav-logo" src="" alt="Grupo Labektron"></a>
    <nav class="nav__links">
      <a href="index.html">Inicio</a>
      <a href="index.html#empresas">Empresas</a>
      <a href="trabajos.html">Proyectos</a>
      <a href="index.html#contacto">Contacto</a>
    </nav>
    <a href="index.html#contacto" class="btn">Contactanos</a>
  </div>
</header>

<section class="pagina-hero">
  <div class="pagina-hero__glow"></div>
  <div class="contenedor">
    <a href="index.html" class="volver">← Volver al inicio</a>
    <span class="eyebrow" id="pt-eyebrow"></span>
    <h1 class="titulo-seccion" id="pt-titulo"></h1>
    <p class="subtitulo-seccion" id="pt-subtitulo"></p>
  </div>
</section>

<section class="seccion">
  <div class="contenedor">
    <div class="timeline" id="trabajos-grid" data-modo="todos" data-timeline="1">
      <div class="timeline__progreso" id="tl-progreso"></div>
    </div>
  </div>
</section>

<!-- MODAL DE GALERÍA -->
<div class="modal" id="modal-trabajo">
  <div class="modal__caja">
    <button class="modal__cerrar" id="modal-cerrar" aria-label="Cerrar">×</button>
    <div class="galeria" id="modal-galeria"></div>
    <div class="modal__cuerpo">
      <h2 id="modal-titulo"></h2>
      <div class="modal__detalles" id="modal-detalles"></div>
      <p id="modal-descripcion"></p>
    </div>
  </div>
</div>

<footer class="empresa-footer">
  <div class="contenedor">
    <img id="footer-logo" src="" alt="Grupo Labektron">
    <p>© <span id="anio"></span> <span id="footer-nombre"></span> — <span id="footer-copy"></span></p>
    <a href="index.html">Volver al inicio</a>
  </div>
</footer>

<a id="wa-flotante" class="wa-flotante" href="#" target="_blank" rel="noopener" aria-label="WhatsApp">
  <svg viewBox="0 0 24 24"><path d="M17.5 14.4c-.3-.1-1.7-.8-2-.9-.3-.1-.5-.1-.7.1-.2.3-.7.9-.9 1.1-.2.2-.3.2-.6.1-.3-.1-1.2-.5-2.3-1.4-.9-.8-1.4-1.7-1.6-2-.2-.3 0-.5.1-.6.1-.1.3-.3.4-.5.1-.2.2-.3.3-.5.1-.2 0-.4 0-.5 0-.1-.7-1.6-.9-2.2-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.5s1.1 2.9 1.2 3.1c.1.2 2.1 3.2 5 4.5.7.3 1.2.5 1.7.6.7.2 1.3.2 1.8.1.6-.1 1.7-.7 1.9-1.3.2-.7.2-1.2.2-1.3-.1-.2-.3-.2-.6-.4zM12 2C6.5 2 2 6.5 2 12c0 1.8.5 3.4 1.3 4.9L2 22l5.3-1.4c1.4.8 3 1.2 4.7 1.2 5.5 0 10-4.5 10-10S17.5 2 12 2z"/></svg>
</a>

<script src="datos.js"></script>
<script>
  // Cabecera y footer de la página
  const s = SECCIONES.paginaTrabajos;
  document.getElementById('pt-eyebrow').textContent = s.eyebrow;
  document.getElementById('pt-titulo').textContent = s.titulo;
  document.getElementById('pt-subtitulo').textContent = s.subtitulo;
  document.getElementById('nav-logo').src = EMPRESA.logo;
  document.getElementById('footer-logo').src = EMPRESA.logo;
  document.getElementById('footer-nombre').textContent = EMPRESA.nombre;
  document.getElementById('footer-copy').textContent = EMPRESA.footerCopyright;
  document.getElementById('anio').textContent = new Date().getFullYear();
  const wa = 'https://wa.me/' + EMPRESA.whatsapp + '?text=' + encodeURIComponent(EMPRESA.whatsappTexto);
  document.getElementById('wa-flotante').href = wa;
  const header = document.getElementById('header');
  addEventListener('scroll', () => header.classList.toggle('scrolled', scrollY > 20));
</script>
<script src="trabajos.js"></script>
<script>
  // Animación de entrada
  const obs = new IntersectionObserver(es => {
    es.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
  }, { threshold: 0.12 });
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
</script>
</body>
</html>

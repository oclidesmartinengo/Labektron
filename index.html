<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRUPO LABEKTRON | Innovación y Tecnología para un Futuro Eficiente</title>
<meta name="description" content="Soluciones integrales en ingeniería eléctrica, electrónica y energías renovables.">

<!-- Tipografías -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  /* =========================================================================
     TEMA / COLORES — cambiá estos valores para reestilizar toda la web
     ========================================================================= */
  :root {
    /* ===== PALETA — azul pizarra claro, moderno e inmersivo ===== */
    --fondo:        #1a2437;   /* fondo principal (azul pizarra) */
    --fondo-alt:    #212d44;   /* fondo de secciones alternas */
    --tarjeta:      #2a3752;   /* fondo de tarjetas */
    --borde:        #3a4a6b;   /* líneas y bordes */
    --texto:        #f2f5fa;   /* texto principal */
    --texto-suave:  #b4c0d6;   /* texto secundario */
    --acento:       #00c2ff;   /* celeste eléctrico (Elektron) */
    --acento-2:     #ff8a3d;   /* naranja (Labelec) */
    --display: 'Sora', sans-serif;
    --body: 'Inter', sans-serif;
    --radio: 14px;
    --ancho: 1200px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--body);
    background: var(--fondo);
    color: var(--texto);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  h1, h2, h3, .display { font-family: var(--display); line-height: 1.15; }

  a { color: inherit; text-decoration: none; }

  img { max-width: 100%; display: block; }

  .contenedor { width: 92%; max-width: var(--ancho); margin: 0 auto; }

  .seccion { padding: 96px 0; }
  .seccion--alt { background: var(--fondo-alt); }

  .eyebrow {
    display: inline-block;
    font-size: 0.78rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--acento);
    font-weight: 600;
    margin-bottom: 16px;
  }

  .titulo-seccion {
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    font-weight: 800;
    margin-bottom: 16px;
    letter-spacing: -0.02em;
  }

  .subtitulo-seccion {
    color: var(--texto-suave);
    max-width: 620px;
    margin-bottom: 56px;
    font-size: 1.05rem;
  }

  /* ===================== HEADER / NAV ===================== */
  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(10,14,23,0.72);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid transparent;
    transition: border-color .3s, background .3s;
  }
  header.scrolled { border-bottom-color: var(--borde); }
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    height: 92px;
  }
  .nav__logo { display: flex; align-items: center; gap: 12px; font-family: var(--display); font-weight: 800; letter-spacing: 0.02em; }
  .nav__logo img { height: 58px; width: auto; }
  .nav__links { display: flex; gap: 34px; }
  .nav__links a { font-size: 0.92rem; color: var(--texto-suave); font-weight: 500; transition: color .2s; }
  .nav__links a:hover { color: var(--texto); }
  .nav__toggle { display: none; background: none; border: 0; color: var(--texto); font-size: 1.6rem; cursor: pointer; }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--acento); color: #041016;
    font-weight: 600; font-family: var(--display);
    padding: 12px 22px; border-radius: 999px;
    font-size: 0.92rem; transition: transform .2s, box-shadow .2s;
    box-shadow: 0 6px 24px -8px var(--acento);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px -8px var(--acento); }
  .btn--ghost { background: transparent; color: var(--texto); border: 1px solid var(--borde); box-shadow: none; }
  .btn--ghost:hover { border-color: var(--acento); color: var(--acento); }

  /* ===================== HERO (foto de fondo) ===================== */
  .hero {
    position: relative; overflow: hidden;
    padding: 150px 0 0;
    border-bottom: 1px solid var(--borde);
  }
  /* Foto de fondo a pantalla completa */
  .hero__fondo {
    position: absolute; inset: 0; z-index: 0;
    background-size: cover; background-position: center right;
  }
  /* Degradado oscuro encima: sólido a la izquierda (para leer el texto),
     transparente a la derecha (para ver la foto) */
  .hero__velo {
    position: absolute; inset: 0; z-index: 1;
    background:
      linear-gradient(90deg, var(--fondo) 0%, rgba(26,36,55,0.92) 34%, rgba(26,36,55,0.55) 62%, rgba(26,36,55,0.30) 100%),
      linear-gradient(0deg, var(--fondo) 2%, transparent 30%);
  }
  .hero__glow {
    position: absolute; inset: 0; z-index: 1;
    background: radial-gradient(circle at 72% 42%, rgba(0,194,255,0.16), transparent 46%);
    pointer-events: none;
  }
  /* Anillo decorativo animado */
  .hero__anillo {
    position: absolute; z-index: 1; pointer-events: none;
    top: 42%; right: 12%; transform: translate(50%,-50%);
    width: 620px; max-width: 60vw; aspect-ratio: 1; border-radius: 50%;
    border: 1px solid rgba(0,194,255,0.28);
    box-shadow: 0 0 120px -20px rgba(0,194,255,0.30) inset;
    animation: girar 40s linear infinite;
  }
  .hero__anillo::after {
    content: ''; position: absolute; inset: 8%;
    border-radius: 50%; border: 1px dashed rgba(0,194,255,0.18);
  }
  @keyframes girar { from { transform: translate(50%,-50%) rotate(0); } to { transform: translate(50%,-50%) rotate(360deg); } }

  /* Partículas flotantes */
  .hero__particulas { position: absolute; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
  .particula { position: absolute; width: 4px; height: 4px; border-radius: 50%; background: var(--acento); opacity: .5; animation: flotar linear infinite; }
  @keyframes flotar {
    0% { transform: translateY(20px); opacity: 0; }
    12% { opacity: .6; }
    88% { opacity: .6; }
    100% { transform: translateY(-120px); opacity: 0; }
  }

  .hero__contenido {
    position: relative; z-index: 2; max-width: 620px;
    padding-bottom: 46px;
  }
  .hero h1 {
    font-size: clamp(2.2rem, 4.6vw, 3.8rem);
    font-weight: 800; letter-spacing: -0.03em; margin-bottom: 22px;
  }
  .hero h1 .destaca {
    background: linear-gradient(100deg, var(--acento) 12%, #9fd4ee 46%, var(--acento-2) 92%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .hero p { font-size: clamp(1rem, 1.4vw, 1.15rem); color: var(--texto-suave); max-width: 460px; margin-bottom: 34px; }
  .hero__acciones { display: flex; gap: 14px; flex-wrap: wrap; }

  /* --- Fila de valores --- */
  .hero__valores {
    position: relative; z-index: 2;
    display: grid; grid-template-columns: repeat(4, 1fr);
    padding: 34px 0 46px; max-width: 680px;
  }
  .valor { text-align: left; padding: 0 26px; border-right: 1px solid var(--borde); }
  .valor:first-child { padding-left: 0; }
  .valor:last-child { border-right: 0; padding-right: 0; }
  .valor__ico {
    width: 46px; height: 46px; border-radius: 50%;
    background: rgba(42,55,82,0.6); border: 1px solid var(--borde);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 14px; transition: border-color .3s, transform .3s;
  }
  .valor:hover .valor__ico { border-color: var(--acento); transform: translateY(-3px); }
  .valor__ico svg { width: 20px; height: 20px; fill: none; stroke: var(--acento); stroke-width: 2; }
  .valor__txt {
    font-family: var(--display); font-size: .72rem; font-weight: 600;
    letter-spacing: .1em; text-transform: uppercase; color: var(--texto-suave); line-height: 1.6;
  }
  .valor__txt b { display: block; color: var(--texto); font-weight: 600; }

  /* --- Barra de estadísticas --- */
  .stats {
    position: relative; z-index: 2;
    border-top: 1px solid var(--borde);
    background: rgba(0,0,0,0.22); backdrop-filter: blur(2px);
  }
  .stats__cols { display: grid; grid-template-columns: 1.5fr 1fr; gap: 40px; align-items: center; padding: 30px 0; }
  .stats__nums { display: grid; grid-template-columns: repeat(4, 1fr); }
  .stat { padding: 0 24px; border-right: 1px solid var(--borde); }
  .stat:first-child { padding-left: 0; }
  .stat:last-child { border-right: 0; padding-right: 0; }
  .stat__n { font-family: var(--display); font-size: 1.6rem; font-weight: 800; color: var(--acento); line-height: 1.1; }
  .stat__t { font-size: .7rem; letter-spacing: .09em; text-transform: uppercase; color: var(--texto-suave); margin-top: 5px; line-height: 1.5; }
  .stats__frase { font-size: .95rem; color: var(--texto-suave); }
  .stats__frase b { display: block; color: var(--acento); font-weight: 500; margin-top: 5px; }

  /* ===================== NUESTRA IDENTIDAD ===================== */
  .identidad-seccion { position: relative; overflow: hidden; }
  /* Foto fusionada a la derecha, difuminada hacia el fondo */
  .identidad-seccion__fondo {
    position: absolute; top: 0; right: 0; bottom: 0; width: 62%; z-index: 0;
    background-size: cover; background-position: center;
    -webkit-mask-image: linear-gradient(90deg, transparent, #000 55%);
            mask-image: linear-gradient(90deg, transparent, #000 55%);
    opacity: .5;
  }
  .identidad-seccion__velo {
    position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(90deg, var(--fondo) 20%, transparent 75%);
  }
  .identidad { position: relative; z-index: 2; max-width: 620px; }
  .identidad__linea { width: 72px; height: 4px; border-radius: 4px; background: var(--acento); margin: 4px 0 28px; }
  .identidad__texto .titulo-seccion { margin-bottom: 8px; }
  .identidad__texto p { color: var(--texto-suave); margin-bottom: 20px; font-size: 1.02rem; line-height: 1.75; }
  .identidad__texto p:last-child { margin-bottom: 0; }
  .identidad__texto p b { color: var(--texto); font-weight: 700; }

  /* ===================== NUESTRAS EMPRESAS (tarjetas) ===================== */
  .empresas-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
  .empresa-card {
    position: relative; display: block;
    background: var(--tarjeta); border: 1px solid var(--borde);
    border-radius: var(--radio); padding: 42px 40px 36px; overflow: hidden;
    transition: transform .3s, border-color .3s, box-shadow .3s;
  }
  /* Barra de color arriba de cada tarjeta (usa el color de la empresa) */
  .empresa-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: var(--empresa-color, var(--acento));
  }
  .empresa-card:hover {
    transform: translateY(-6px);
    border-color: var(--empresa-color, var(--acento));
    box-shadow: 0 20px 50px -24px var(--empresa-color, var(--acento));
  }
  /* Recuadro claro detrás del logo para que resalten los logos oscuros */
  .empresa-card__logo {
    display: inline-flex; align-items: center; justify-content: center;
    background: #f4f6fb; border-radius: 12px;
    padding: 16px 22px; margin-bottom: 22px;
    min-height: 86px; min-width: 150px;
  }
  .empresa-card__logo img { height: 54px; width: auto; object-fit: contain; margin: 0; }
  .empresa-card h3 { font-size: 1.6rem; font-weight: 800; letter-spacing: 0.04em; margin-bottom: 4px; }
  .empresa-card .empresa-lema { color: var(--empresa-color, var(--acento)); font-family: var(--display); font-size: 0.82rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 18px; }
  .empresa-card p { color: var(--texto-suave); margin-bottom: 24px; }
  .empresa-card .empresa-vermas {
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--empresa-color, var(--acento)); font-family: var(--display); font-weight: 600; font-size: 0.95rem;
  }
  .empresa-card .empresa-vermas svg { width: 18px; height: 18px; fill: currentColor; transition: transform .3s; }
  .empresa-card:hover .empresa-vermas svg { transform: translateX(5px); }

  /* ===================== TRABAJOS ===================== */
  .grid-cards {
    display: grid; gap: 24px;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  }
  .card {
    background: var(--tarjeta); border: 1px solid var(--borde);
    border-radius: var(--radio); overflow: hidden;
    transition: transform .3s, border-color .3s;
  }
  .card:hover { transform: translateY(-4px); border-color: var(--acento); }
  .card__img { aspect-ratio: 4/3; overflow: hidden; background: var(--fondo-alt); }
  .card__img img { width: 100%; height: 100%; object-fit: cover; transition: transform .5s; }
  .card:hover .card__img img { transform: scale(1.06); }
  .card__body { padding: 22px 24px 26px; }
  .card__body h3 { font-size: 1.15rem; font-weight: 700; margin-bottom: 8px; }
  .card__body p { color: var(--texto-suave); font-size: 0.95rem; }
  /* Tarjeta clickeable (tiene galería) */
  .card--clic { cursor: pointer; }
  .card__vermas {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 14px; color: var(--acento); font-size: 0.88rem;
    font-family: var(--display); font-weight: 600;
  }
  .card__vermas svg { width: 16px; height: 16px; fill: currentColor; transition: transform .3s; }
  .card--clic:hover .card__vermas svg { transform: translateX(4px); }

  /* ===================== MODAL DE GALERÍA (proyecto) ===================== */
  .modal {
    position: fixed; inset: 0; z-index: 200;
    display: none; align-items: center; justify-content: center;
    padding: 24px;
    background: rgba(4,7,13,0.82); backdrop-filter: blur(6px);
  }
  .modal.abierto { display: flex; }
  .modal__caja {
    background: var(--fondo-alt); border: 1px solid var(--borde);
    border-radius: 18px; width: 100%; max-width: 960px;
    max-height: 90vh; overflow-y: auto;
    position: relative;
    animation: modalEntra .35s ease;
  }
  @keyframes modalEntra { from { opacity: 0; transform: translateY(20px) scale(.98); } to { opacity: 1; transform: none; } }
  .modal__cerrar {
    position: absolute; top: 16px; right: 16px; z-index: 3;
    width: 42px; height: 42px; border-radius: 50%; border: 0;
    background: rgba(0,0,0,0.5); color: #fff; font-size: 1.5rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: background .2s;
  }
  .modal__cerrar:hover { background: var(--acento); color: #041016; }

  /* Carrusel dentro del modal */
  .galeria { position: relative; background: #05070c; border-radius: 18px 18px 0 0; overflow: hidden; }
  .galeria__viewport { aspect-ratio: 16/10; }
  .galeria__pista { display: flex; height: 100%; transition: transform .4s ease; }
  .galeria__slide { min-width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
  /* "contain" muestra la foto ENTERA (no recorta). Ideal para fotos verticales. */
  .galeria__slide img { width: 100%; height: 100%; object-fit: contain; }
  .galeria__flecha {
    position: absolute; top: 50%; transform: translateY(-50%); z-index: 2;
    width: 46px; height: 46px; border-radius: 50%; border: 0; cursor: pointer;
    background: rgba(0,0,0,0.55); color: #fff; font-size: 1.5rem;
    display: flex; align-items: center; justify-content: center; transition: background .2s;
  }
  .galeria__flecha:hover { background: var(--acento); color: #041016; }
  .galeria__flecha--izq { left: 14px; }
  .galeria__flecha--der { right: 14px; }
  .galeria__puntos { position: absolute; bottom: 14px; left: 0; right: 0; display: flex; gap: 8px; justify-content: center; z-index: 2; }
  .galeria__punto { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,0.45); cursor: pointer; transition: background .2s, transform .2s; }
  .galeria__punto.activo { background: var(--acento); transform: scale(1.25); }

  /* Contenido de texto del modal */
  .modal__cuerpo { padding: 32px 36px 40px; }
  .modal__cuerpo h2 { font-size: 1.7rem; font-weight: 800; margin-bottom: 20px; }
  .modal__detalles {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px 24px; margin-bottom: 28px;
    padding-bottom: 28px; border-bottom: 1px solid var(--borde);
  }
  .modal__dato .etq { font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--acento); font-weight: 600; margin-bottom: 4px; }
  .modal__dato .val { color: var(--texto); font-size: 1rem; }
  .modal__cuerpo > p { color: var(--texto-suave); font-size: 1.02rem; line-height: 1.75; }

  .trabajos-cta { display: flex; justify-content: center; margin-top: 48px; }

  /* ===================== CLIENTES (carrusel deslizante) ===================== */
  .clientes-carrusel {
    position: relative; width: 100%; overflow: hidden;
    /* Difuminado suave en los bordes izq/der para que entren/salgan con elegancia */
    -webkit-mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);
            mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);
  }
  .clientes-pista {
    display: flex; width: max-content;
    animation: desplazar var(--vel-carrusel, 40s) linear infinite;
  }
  /* Al pasar el mouse, se pausa */
  .clientes-carrusel:hover .clientes-pista { animation-play-state: paused; }

  .cliente {
    /* Fondo claro para que TODOS los logos resalten (incluidos los de letras oscuras) */
    flex: 0 0 auto; width: 190px; margin: 0 12px;
    background: #f4f6fb; border: 1px solid var(--borde);
    border-radius: var(--radio); padding: 26px 24px;
    display: flex; align-items: center; justify-content: center;
    min-height: 110px; transition: transform .3s, box-shadow .3s;
  }
  .cliente:hover { transform: translateY(-4px); box-shadow: 0 10px 30px -12px rgba(0,0,0,0.5); }
  .cliente img { max-height: 60px; width: auto; object-fit: contain; }

  @keyframes desplazar {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }  /* -50% porque la lista está duplicada */
  }
  /* Segunda fila: va en sentido contrario */
  @keyframes desplazar-inverso {
    from { transform: translateX(-50%); }
    to   { transform: translateX(0); }
  }
  .clientes-pista--inversa { animation-name: desplazar-inverso; }
  .clientes-carrusel + .clientes-carrusel { margin-top: 20px; }
  @media (prefers-reduced-motion: reduce) {
    .clientes-pista { animation: none; flex-wrap: wrap; justify-content: center; }
  }


  /* ===================== SECTORES ===================== */
  .sector {
    position: relative; border-radius: var(--radio); overflow: hidden;
    aspect-ratio: 3/4; border: 1px solid var(--borde);
  }
  .sector img { width: 100%; height: 100%; object-fit: cover; transition: transform .5s; }
  .sector:hover img { transform: scale(1.06); }
  .sector__overlay {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 30%, rgba(6,9,16,0.92));
    display: flex; flex-direction: column; justify-content: flex-end; padding: 24px;
  }
  .sector__overlay h3 { font-size: 1.25rem; font-weight: 700; margin-bottom: 6px; }
  .sector__overlay p { color: var(--texto-suave); font-size: 0.9rem; }

  /* ===================== OFICINAS ===================== */
  .oficinas-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; }
  .oficina {
    background: var(--tarjeta); border: 1px solid var(--borde);
    border-radius: var(--radio); overflow: hidden;
  }
  .oficina__img { aspect-ratio: 16/10; overflow: hidden; background: #05070c; position: relative; }
  .oficina__img img { width: 100%; height: 100%; object-fit: contain; }
  /* Carrusel de fotos dentro de la tarjeta de oficina */
  .of-pista { display: flex; height: 100%; transition: transform .4s ease; }
  .of-slide { min-width: 100%; height: 100%; }
  .of-flecha {
    position: absolute; top: 50%; transform: translateY(-50%); z-index: 2;
    width: 38px; height: 38px; border-radius: 50%; border: 0; cursor: pointer;
    background: rgba(0,0,0,0.55); color: #fff; font-size: 1.3rem;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity .25s, background .2s;
  }
  .oficina:hover .of-flecha { opacity: 1; }
  .of-flecha:hover { background: var(--acento); color: #041016; }
  .of-flecha--izq { left: 10px; }
  .of-flecha--der { right: 10px; }
  .of-puntos { position: absolute; bottom: 10px; left: 0; right: 0; display: flex; gap: 6px; justify-content: center; z-index: 2; }
  .of-punto { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.5); cursor: pointer; transition: background .2s, transform .2s; }
  .of-punto.activo { background: var(--acento); transform: scale(1.3); }
  .oficina__body { padding: 24px; }
  .oficina__body h3 { font-size: 1.25rem; font-weight: 700; margin-bottom: 8px; }
  .oficina__body p { color: var(--texto-suave); }

  /* ===================== CONTACTO / CTA ===================== */
  .cta {
    text-align: center;
    background:
      radial-gradient(circle at 50% 0%, rgba(0,194,255,0.12), transparent 60%),
      var(--fondo-alt);
    border-top: 1px solid var(--borde);
    padding: 110px 0;
  }
  .cta h2 { font-size: clamp(2rem, 5vw, 3rem); font-weight: 800; margin-bottom: 20px; }
  .cta p { color: var(--texto-suave); max-width: 520px; margin: 0 auto 40px; font-size: 1.1rem; }

  /* ===================== MAPA / UBICACIÓN ===================== */
  .mapa-marco {
    position: relative; border: 1px solid var(--borde); border-radius: var(--radio);
    overflow: hidden; background: var(--tarjeta);
    box-shadow: 0 20px 60px -30px rgba(0,0,0,0.8);
  }
  .mapa-marco iframe {
    display: block; width: 100%; height: 440px; border: 0;
    /* Integra el mapa (claro) con el tema oscuro sin que desentone */
    filter: grayscale(0.3) contrast(1.05) brightness(0.92);
  }
  /* Cinta inferior con la dirección y botón para abrir en Google Maps */
  .mapa-pie {
    display: flex; flex-wrap: wrap; gap: 14px 20px; align-items: center; justify-content: space-between;
    padding: 20px 26px; border-top: 1px solid var(--borde); background: var(--fondo-alt);
  }
  .mapa-pie__dir { display: flex; align-items: center; gap: 12px; color: var(--texto); font-size: 0.98rem; }
  .mapa-pie__dir svg { width: 20px; height: 20px; fill: none; stroke: var(--acento); stroke-width: 2; flex-shrink: 0; }

  /* ===================== FOOTER ===================== */
  .site-footer {
    border-top: 1px solid var(--borde);
    background: var(--fondo);
    padding: 72px 0 0;
  }
  .footer-grid {
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr 1.3fr;
    gap: 40px;
  }
  .footer-col h4 {
    font-family: var(--display); font-size: 1.05rem; font-weight: 700;
    letter-spacing: 0.05em; margin-bottom: 22px; color: var(--texto);
  }
  .footer-marca img { height: 44px; width: auto; margin-bottom: 22px; }
  .footer-marca p { color: var(--texto-suave); font-size: 0.95rem; max-width: 300px; margin-bottom: 24px; }
  .footer-redes { display: flex; gap: 12px; }
  .footer-redes a {
    width: 40px; height: 40px; border-radius: 10px;
    border: 1px solid var(--borde); background: var(--tarjeta);
    display: flex; align-items: center; justify-content: center;
    transition: border-color .25s, transform .25s, background .25s;
  }
  .footer-redes a:hover { border-color: var(--acento); transform: translateY(-3px); background: var(--fondo-alt); }
  .footer-redes svg { width: 18px; height: 18px; fill: var(--texto-suave); transition: fill .25s; }
  .footer-redes a:hover svg { fill: var(--acento); }

  .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 13px; }
  .footer-col ul a { color: var(--texto-suave); font-size: 0.95rem; transition: color .2s, padding-left .2s; }
  .footer-col ul a:hover { color: var(--acento); padding-left: 4px; }

  .footer-contacto li {
    display: flex; align-items: flex-start; gap: 12px;
    color: var(--texto-suave); font-size: 0.95rem; margin-bottom: 15px; list-style: none;
  }
  .footer-contacto ul { list-style: none; }
  .footer-contacto svg { width: 18px; height: 18px; fill: none; stroke: var(--acento); stroke-width: 2; flex-shrink: 0; margin-top: 2px; }
  .footer-contacto a { color: var(--texto-suave); transition: color .2s; word-break: break-word; }
  .footer-contacto a:hover { color: var(--acento); }

  .footer-base {
    border-top: 1px solid var(--borde); margin-top: 56px; padding: 26px 0;
    text-align: center; color: var(--texto-suave); font-size: 0.88rem;
  }

  /* ===================== BOTÓN WHATSAPP FLOTANTE ===================== */
  .wa-flotante {
    position: fixed; bottom: 24px; right: 24px; z-index: 90;
    width: 58px; height: 58px; border-radius: 50%;
    background: #25D366; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 28px -6px rgba(37,211,102,0.6);
    transition: transform .2s;
  }
  .wa-flotante:hover { transform: scale(1.08); }
  .wa-flotante svg { width: 30px; height: 30px; fill: #fff; }

  /* ===================== ANIMACIÓN DE ENTRADA ===================== */
  .reveal { opacity: 0; transform: translateY(24px); transition: opacity .6s ease, transform .6s ease; }
  .reveal.visible { opacity: 1; transform: none; }

  /* ===================== RESPONSIVE ===================== */
  @media (max-width: 980px) {
    .hero__fondo { background-position: center; }
    .hero__velo { background: linear-gradient(0deg, var(--fondo) 8%, rgba(26,36,55,0.86) 55%, rgba(26,36,55,0.7) 100%); }
    .hero__valores { max-width: 100%; }
    .stats__cols { grid-template-columns: 1fr; gap: 26px; }
  }
  @media (max-width: 620px) {
    .hero__valores { grid-template-columns: 1fr 1fr; gap: 26px 0; }
    .valor:nth-child(2) { border-right: 0; }
    .stats__nums { grid-template-columns: 1fr 1fr; gap: 24px 0; }
    .stat:nth-child(2) { border-right: 0; }
  }
  @media (max-width: 860px) {
    .identidad { grid-template-columns: 1fr; gap: 36px; }
    .identidad__media { order: -1; }
    .empresas-grid { grid-template-columns: 1fr; }
    .footer-grid { grid-template-columns: 1fr 1fr; gap: 32px; }
    .footer-marca { grid-column: 1 / -1; }
    .nav__links {
      position: fixed; top: 92px; left: 0; right: 0;
      flex-direction: column; gap: 0;
      background: var(--fondo-alt); border-bottom: 1px solid var(--borde);
      padding: 8px 0; transform: translateY(-120%); transition: transform .3s; z-index: 99;
    }
    .nav__links.abierto { transform: translateY(0); }
    .nav__links a { padding: 14px 24px; }
    .nav__toggle { display: block; }
    .nav .btn { display: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    * { scroll-behavior: auto !important; }
    .reveal { transition: none; opacity: 1; transform: none; }
  }
  @media (max-width: 560px) {
    .footer-grid { grid-template-columns: 1fr; }
  }
</style>

<script src="datos.js"></script>
<script>
/* ==========================================================================
   Este código lee las listas de datos.js y genera el HTML automáticamente.
   No necesitás tocarlo. Todo el contenido se edita en datos.js
   ========================================================================== */

// --- Utilidad: escribe texto en un elemento si existe ---
function set(id, texto) { const el = document.getElementById(id); if (el) el.textContent = texto; }

// --- Datos generales ---
document.getElementById('nav-logo').src = EMPRESA.logo;
document.getElementById('footer-logo').src = EMPRESA.logo;
set('hero-eyebrow', EMPRESA.nombre);
// Título: pinta con degradado las palabras indicadas en "destacarEnEslogan"
(function() {
  const d = EMPRESA.destacarEnEslogan;
  let html = EMPRESA.eslogan;
  if (d && html.includes(d)) html = html.replace(d, `<span class="destaca">${d}</span>`);
  document.getElementById('hero-titulo').innerHTML = html;
})();
// Imagen del hero
if (EMPRESA.imagenHero) document.getElementById('hero-fondo').style.backgroundImage = `url('${EMPRESA.imagenHero}')`;

// Partículas flotantes (efecto dinámico)
(function() {
  const cont = document.getElementById('hero-particulas');
  if (!cont) return;
  let html = '';
  for (let i = 0; i < 22; i++) {
    const x = Math.random()*100, dur = 6+Math.random()*8, del = Math.random()*8, sz = 2+Math.random()*3;
    html += `<span class="particula" style="left:${x}%;animation-duration:${dur}s;animation-delay:${del}s;width:${sz}px;height:${sz}px"></span>`;
  }
  cont.innerHTML = html;
})();

// --- Los 4 valores del hero ---
(function() {
  const ICONOS = {
    rayo:      '<svg viewBox="0 0 24 24"><path d="M13 2L4.5 13.5H11l-1 8.5 8.5-11.5H12l1-8.5z"/></svg>',
    grafico:   '<svg viewBox="0 0 24 24"><path d="M6 19V11M12 19V5M18 19v-6"/></svg>',
    escudo:    '<svg viewBox="0 0 24 24"><path d="M12 3l7 3v6c0 4.3-3 8.3-7 9.5C8 20.3 5 16.3 5 12V6l7-3z"/></svg>',
    hoja:      '<svg viewBox="0 0 24 24"><path d="M5 19c0-8 5-13 14-13 0 9-5 14-13 14H5v-1z"/><path d="M9 15c2-3 5-5 8-6"/></svg>',
    engranaje: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M12 3v2.2M12 18.8V21M21 12h-2.2M5.2 12H3M18.4 5.6l-1.6 1.6M7.2 16.8l-1.6 1.6M18.4 18.4l-1.6-1.6M7.2 7.2L5.6 5.6"/></svg>',
    reloj:     '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
  };
  const cont = document.getElementById('hero-valores');
  if (!cont || typeof VALORES_HERO === 'undefined') return;
  cont.innerHTML = VALORES_HERO.map(v => `
    <div class="valor">
      <div class="valor__ico">${ICONOS[v.icono] || ICONOS.rayo}</div>
      <div class="valor__txt"><b>${v.linea1}</b>${v.linea2}</div>
    </div>`).join('');
})();

// --- Barra de estadísticas ---
(function() {
  const cont = document.getElementById('stats-nums');
  if (!cont || typeof ESTADISTICAS === 'undefined') return;
  if (!ESTADISTICAS.length) { document.getElementById('stats').style.display = 'none'; return; }
  cont.innerHTML = ESTADISTICAS.map(s => `
    <div class="stat">
      <div class="stat__n">${s.numero}</div>
      <div class="stat__t">${s.texto}</div>
    </div>`).join('');
  if (typeof FRASE_ESTADISTICAS !== 'undefined') {
    document.getElementById('stats-frase').innerHTML =
      FRASE_ESTADISTICAS.linea1 + '<b>' + FRASE_ESTADISTICAS.linea2 + '</b>';
  }
})();
set('hero-desc', EMPRESA.descripcionHero);
set('hero-boton1', EMPRESA.botonHero1);
set('hero-boton2', EMPRESA.botonHero2);
set('nav-boton', BOTON_CONTACTO);
set('footer-copy', EMPRESA.footerCopyright);
set('footer-nombre', EMPRESA.nombre);
document.getElementById('anio').textContent = new Date().getFullYear();

// --- Menú de navegación ---
document.getElementById('menu').innerHTML = MENU.map(m =>
  `<a href="${m.ancla}">${m.texto}</a>`).join('');

// --- Títulos de cada sección (eyebrow / título / subtítulo) ---
for (const clave in SECCIONES) {
  const s = SECCIONES[clave];
  const eb = document.querySelector(`[data-eyebrow="${clave}"]`);
  const ti = document.querySelector(`[data-titulo="${clave}"]`);
  const su = document.querySelector(`[data-subtitulo="${clave}"]`);
  if (eb) eb.textContent = s.eyebrow || '';
  if (ti) ti.textContent = s.titulo || '';
  if (su) { su.textContent = s.subtitulo || ''; if (!s.subtitulo) su.style.display = 'none'; }
}

// --- Sección de contacto (CTA) ---
set('cta-titulo', SECCIONES.contacto.titulo);
set('cta-subtitulo', SECCIONES.contacto.subtitulo);
set('cta-wa', SECCIONES.contacto.boton);
set('btn-todos-trabajos', SECCIONES.trabajos.boton);

// --- WhatsApp ---
const waLink = 'https://wa.me/' + EMPRESA.whatsapp + '?text=' + encodeURIComponent(EMPRESA.whatsappTexto);
document.getElementById('cta-wa').href = waLink;
document.getElementById('wa-flotante').href = waLink;

// --- Mapa / ubicación ---
(function() {
  const m = SECCIONES.mapa;
  if (!m || !m.direccion) return;
  const dir = encodeURIComponent(m.direccion);
  // Mapa embebido (no necesita clave de API)
  document.getElementById('mapa-iframe').src =
    `https://maps.google.com/maps?q=${dir}&z=${m.zoom || 16}&output=embed`;
  // Texto de la dirección y botón "Abrir en Google Maps"
  set('mapa-direccion', m.direccion);
  document.getElementById('mapa-boton').href =
    `https://www.google.com/maps/search/?api=1&query=${dir}`;
})();

// --- Utilidad: crea imagen con carga diferida (lazy) ---
function img(src, alt) {
  return `<img src="${src}" alt="${alt}" loading="lazy" decoding="async"
           onerror="this.style.opacity=.25;this.alt='Falta: '+this.src">`;
}

// --- Nuestra identidad (párrafos + imagen) ---
if (SECCIONES.grupo.imagen) document.getElementById('identidad-fondo').style.backgroundImage = `url('${SECCIONES.grupo.imagen}')`;
document.getElementById('identidad-parrafos').innerHTML = SECCIONES.grupo.parrafos.map(p => {
  const negrita = p.titulo ? `<b>${p.titulo}</b> ` : '';
  return `<p>${negrita}${p.texto}</p>`;
}).join('');

// --- Nuestras empresas (tarjetas que llevan a su página propia) ---
document.getElementById('grupo-grid').innerHTML = EMPRESAS_GRUPO.map(e => `
  <a class="empresa-card reveal" href="${e.pagina}" style="--empresa-color:${e.color}">
    <span class="empresa-card__logo">${img(e.icono, e.nombre)}</span>
    <h3>${e.nombre}</h3>
    <div class="empresa-lema">${e.lema || ''}</div>
    <p>${e.descripcion}</p>
    <span class="empresa-vermas">Conocer más
      <svg viewBox="0 0 24 24"><path d="M13 5l7 7-7 7-1.4-1.4L16.2 13H4v-2h12.2l-4.6-4.6z"/></svg>
    </span>
  </a>`).join('');

// --- Clientes (carrusel) ---
// Se duplica la lista para que el desplazamiento sea un bucle continuo sin saltos.
const clienteHTML = c => `<div class="cliente">${img(c.logo, c.nombre)}</div>`;
const cintaHTML = CLIENTES.map(clienteHTML).join('') + CLIENTES.map(clienteHTML).join('');
document.getElementById('clientes-grid').innerHTML = cintaHTML;
// Segunda fila: mismos clientes, arrancando por el otro extremo para que no se espejen
const invertidos = [...CLIENTES].reverse();
const cintaHTML2 = invertidos.map(clienteHTML).join('') + invertidos.map(clienteHTML).join('');

// --- Oficinas (con carrusel de fotos) ---
document.getElementById('oficinas-grid').innerHTML = OFICINAS.map((o, idx) => {
  // Acepta "imagenes" (lista) o "imagen" (una sola, formato viejo)
  const fotos = o.imagenes && o.imagenes.length ? o.imagenes : (o.imagen ? [o.imagen] : []);
  const varias = fotos.length > 1;
  const controles = varias ? `
      <button class="of-flecha of-flecha--izq" data-of="${idx}" data-dir="-1" aria-label="Anterior">‹</button>
      <button class="of-flecha of-flecha--der" data-of="${idx}" data-dir="1" aria-label="Siguiente">›</button>
      <div class="of-puntos">
        ${fotos.map((_, i) => `<span class="of-punto ${i===0?'activo':''}" data-of="${idx}" data-i="${i}"></span>`).join('')}
      </div>` : '';
  return `
  <div class="oficina reveal">
    <div class="oficina__img">
      <div class="of-pista" data-pista="${idx}">
        ${fotos.map(f => `<div class="of-slide">${img(f, o.ciudad)}</div>`).join('')}
      </div>
      ${controles}
    </div>
    <div class="oficina__body">
      <h3>${o.ciudad}</h3>
      <p>${o.direccion}</p>
    </div>
  </div>`;
}).join('');

// Lógica de los carruseles de oficina
(function() {
  const pos = {};   // guarda la foto actual de cada oficina
  function mover(idx, nuevo) {
    const pista = document.querySelector(`[data-pista="${idx}"]`);
    if (!pista) return;
    const total = pista.children.length;
    pos[idx] = (nuevo + total) % total;
    pista.style.transform = `translateX(-${pos[idx] * 100}%)`;
    document.querySelectorAll(`.of-punto[data-of="${idx}"]`).forEach((p, i) =>
      p.classList.toggle('activo', i === pos[idx]));
  }
  document.getElementById('oficinas-grid').addEventListener('click', e => {
    const flecha = e.target.closest('.of-flecha');
    if (flecha) {
      const idx = flecha.dataset.of;
      mover(idx, (pos[idx] || 0) + parseInt(flecha.dataset.dir));
      return;
    }
    const punto = e.target.closest('.of-punto');
    if (punto) mover(punto.dataset.of, parseInt(punto.dataset.i));
  });
})();

// --- Header con sombra al hacer scroll ---
const header = document.getElementById('header');

// --- Menú móvil ---
const menu = document.getElementById('menu');
document.getElementById('toggle').onclick = () => menu.classList.toggle('abierto');
menu.querySelectorAll('a').forEach(a => a.onclick = () => menu.classList.remove('abierto'));

// --- Animación de entrada al hacer scroll ---
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
}, { threshold: 0.12 });
document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
